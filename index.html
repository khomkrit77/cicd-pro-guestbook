<!DOCTYPE html>
<html>
<head>
    <title>Guestbook CI/CD Pro</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding-top: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 450px; } /* ขยายความกว้างนิดหน่อย */
        .status { color: #28a745; font-weight: bold; }
        input { padding: 8px; width: 200px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { text-align: left; margin-top: 20px; list-style: none; padding: 0; }
        
        /* สไตล์สำหรับรายการและปุ่มลบ */
        li { 
            background: #eee; 
            margin-bottom: 5px; 
            padding: 10px; 
            border-radius: 4px; 
            border-left: 5px solid #007bff;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .btn-delete {
            color: #dc3545;
            text-decoration: none;
            font-size: 0.8em;
            font-weight: bold;
            padding: 2px 8px;
            border: 1px solid #dc3545;
            border-radius: 4px;
            transition: 0.3s;
        }
        .btn-delete:hover {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📔 Guestbook App</h1>
        <p>Status: <span class="status">Connected to Redis (Persistence)</span></p>
        <hr>

        <form method="POST">
            <input type="text" name="msg" placeholder="Write something..." required>
            <button type="submit">Save to DB</button>
        </form>

        <hr>
        <h3>Messages from Database:</h3>
        <ul>
            {% for m in messages %}
                <li>
                    <span>{{ m }}</span>
                    <a href="{{ url_for('delete_message', index=loop.index0) }}" 
                       class="btn-delete" 
                       onclick="return confirm('คุณแน่ใจว่าจะลบข้อความนี้?')">
                       Delete
                    </a>
                </li>
            {% endfor %}
        </ul>

        <hr>
        <small>Build: BUILD_NUMBER_PLACEHOLDER | Date: DEPLOY_DATE_PLACEHOLDER</small>
    </div>
</body>
</html>
