version: '3.8'

services:
  web:
    image: ${REGISTRY_IMAGE}:${IMAGE_TAG}
    container_name: guestbook-web
    ports:
      - "8080:80"
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    container_name: guestbook-db
    restart: always
    # --- เพิ่มส่วนนี้เข้าไป ---
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes # สั่งให้ Redis เซฟข้อมูลลงไฟล์ตลอดเวลา

# ประกาศสร้าง Volume กลาง
volumes:
  redis-data:
